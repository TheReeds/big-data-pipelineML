apiVersion: 1

datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true

  - name: PostgreSQL
    uid: postgres
    type: postgres
    access: proxy
    url: postgres:5432
    database: weather_dm
    user: spark
    secureJsonData:
      password: spark123
    jsonData:
      sslmode: disable
      postgresVersion: 1600
      timescaledb: false
    editable: true
